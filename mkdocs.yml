site_name: Document to Anki CLI
site_description: Convert documents into Anki flashcards using AI
site_url: https://fjacquet.github.io/anki-maker/
repo_url: https://github.com/fjacquet/anki-maker
repo_name: fjacquet/anki-maker
edit_uri: edit/main/docs/
copyright: MIT Licensed

docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - API Reference: API.md
  - Configuration: CONFIGURATION.md
  - Examples: EXAMPLES.md
  - Troubleshooting: TROUBLESHOOTING.md
  - Security: SECURITY.md
  - Migration: MIGRATION.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# The docs/ folder also holds internal project notes that should not be
# published. Keep them in the repo but out of the built site.
exclude_docs: |
  README.md
  DOCUMENTATION_REORGANIZATION.md
  DOCUMENTATION_UPDATES.md
  MAKEFILE_CHANGES.md
  MAKEFILE_CI_ENHANCEMENTS.md
  SCRIPTS_MAKEFILE_ALIGNMENT.md
  SECURITY_SUMMARY.md

# Legacy docs were not authored for the site; keep relative-link warnings
# non-fatal so --strict only blocks on genuine build errors.
validation:
  nav:
    omitted_files: ignore
  links:
    unrecognized_links: ignore
